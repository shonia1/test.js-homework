<!DOCTYPE html>
<html lang="ka">
    <head>
        <meta charset="UTF-8">
        <title>BMI კალკულატორი</title>
        <link rel="stylesheet" href="styles.css"></link>
    </head>
    <body>
        
        <div class="container">
            <h1>BMI კალკულატორი</h1>
            <input type="number" id="height" placeholder="შეიყვანეთ სიმაღლე(სმ)">
            <input type="number" id="weight" placeholder="შეიყვანეთ წონა(კგ)">
            <button onclick="calculateBMI()">გამოთვლა</button>
            <button onclick="resetCalculator()" class="reset-btn">გასუფთავება</button>
            <p id="result"></p>
        </div>
        <script src="main.js"></script>
    </body>
</html>
